<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | MAXTER</title>
    <style>
        :root {
            --bg: #0A0A0A;
            --accent: #2563EB;
            --text: #FFFFFF;
            --text-muted: #9CA3AF;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 {
            font-size: 8rem;
            margin: 0;
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 1;
        }
        h1 span { color: var(--accent); }
        p {
            color: var(--text-muted);
            font-size: 1.25rem;
            margin: 2rem 0 3rem;
            max-width: 400px;
        }
        a {
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 1rem 2.5rem;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.8rem;
            transition: all 0.3s;
        }
        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.3);
        }
    </style>
</head>
<body>
    <h1>404<span>.</span></h1>
    <p>The page you are looking for does not exist or has been moved.</p>
    <a href="/MAXTER/">Back to Home</a>
</body>
</html>
