name: Build and Deploy Docs

on:
  push:
    branches: [Max]
    paths: [docs-src/**]

permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd docs-src
          npm install

      - name: Build
        run: |
          cd docs-src
          npm run build

      - name: Copy build output to docs/
        run: |
          rm -rf docs
          mkdir -p docs
          cp -r docs-src/dist/* docs/

      - name: Commit docs/
        run: |
          git config user.name "mahendraplus"
          git config user.email "mahendraplus@users.noreply.github.com"
          git add docs/
          git commit -m "ci: rebuild docs [skip ci]" || echo "No changes"
          git push
