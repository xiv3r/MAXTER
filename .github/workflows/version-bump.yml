name: Version Bumper

on:
  push:
    branches:
      - Max # Trigger on pushes to the Max branch
  workflow_dispatch: # Allow manual triggering

# Prevent concurrent runs from creating git conflicts
concurrency:
  group: version-bump-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump-version:
    runs-on: ubuntu-latest
    # Grant permission to push changes back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for git operations

      - name: Process Version Bump
        id: version_logic
        run: |
          PROPS_FILE="version.properties"
          
          # 1. Read current values using grep and cut
          MAIN=$(grep 'MAIN=' $PROPS_FILE | cut -d'=' -f2)
          MINOR=$(grep 'MINOR=' $PROPS_FILE | cut -d'=' -f2)
          BUILD=$(grep 'BUILD=' $PROPS_FILE | cut -d'=' -f2)

          # 2. Increment BUILD by 1
          BUILD=$((BUILD + 1))

          # 3. Apply rollover logic
          # If BUILD exceeds 10, increment MINOR and reset BUILD
          if [ "$BUILD" -gt 10 ]; then
            MINOR=$((MINOR + 1))
            BUILD=1
          fi

          # If MINOR reaches 10, increment MAIN and reset MINOR/BUILD
          if [ "$MINOR" -ge 10 ]; then
            MAIN=$((MAIN + 1))
            MINOR=0
            BUILD=1
          fi

          # 4. Generate the Version Name string
          VERSION_NAME="$MAIN.$MINOR.B$BUILD"
          DISPLAY_VER="Version $VERSION_NAME"
          
          # 5. Export to GITHUB_ENV for downstream steps
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "DISPLAY_VER=$DISPLAY_VER" >> $GITHUB_ENV
          
          # 6. Write values back to properties file
          echo "MAIN=$MAIN" > $PROPS_FILE
          echo "MINOR=$MINOR" >> $PROPS_FILE
          echo "BUILD=$BUILD" >> $PROPS_FILE
          
          # 7. Update version strings in project files
          # Regex to match various version formats: v27.0, Version 27.1.B4, STABLE_v27.0 etc.
          OLD_VER_PATTERN="\(Version \|v\|STABLE_v\)[0-9]\+\.[0-9]\+\(\.B[0-9]\+\)\?"
          
          # Clean up legacy prefixes
          sed -i "s/SYSTEM_READY \/\/ //g" docs-src/src/App.jsx
          sed -i "s/STABLE_v/Version /g" docs-src/src/App.jsx
          
          # Replace all version occurrences with the new clean format
          FILES_TO_UPDATE="setup.sh scripts/maxter_tui.sh README.md docs-src/src/App.jsx install.sh scripts/keys.sh scripts/color_selector.sh scripts/sysinfo.sh scripts/themes/definitions.sh"
          
          for file in $FILES_TO_UPDATE; do
            if [ -f "$file" ]; then
              sed -i "s/$OLD_VER_PATTERN/$DISPLAY_VER/g" "$file"
            fi
          done
          
          # Pass variable to other steps if needed via output
          echo "new_version=$DISPLAY_VER" >> $GITHUB_OUTPUT

      - name: Commit and Push Changes
        run: |
          # Configure identity as github-actions[bot]
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Only commit if files actually changed (idempotency)
          if ! git diff --exit-code; then
            git add .
            git commit -m "chore: bump version to ${{ env.DISPLAY_VER }}"
            git push
          else
            echo "No changes detected. Skipping commit."
          fi
