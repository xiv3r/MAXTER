name: Version Bumper

on:
  push:
    branches:
      - Max # Trigger on pushes to the Max branch
  workflow_dispatch: # Allow manual triggering

# Prevent concurrent runs from creating git conflicts
concurrency:
  group: version-bump-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump-version:
    runs-on: ubuntu-latest
    # Grant permission to push changes back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for git operations

      - name: Process Version Bump
        id: version_logic
        run: |
          PROPS_FILE="version.properties"
          
          # 1. Read current values using grep and cut
          MAIN=$(grep 'MAIN=' $PROPS_FILE | cut -d'=' -f2)
          MINOR=$(grep 'MINOR=' $PROPS_FILE | cut -d'=' -f2)
          BUILD=$(grep 'BUILD=' $PROPS_FILE | cut -d'=' -f2)

          # 2. Increment BUILD by 1
          BUILD=$((BUILD + 1))

          # 3. Apply rollover logic (If MINOR reaches 10)
          if [ "$MINOR" -ge 10 ]; then
            MAIN=$((MAIN + 1))
            MINOR=0
            BUILD=1
          fi

          # 4. Generate the Version Name string
          VERSION_NAME="$MAIN.$MINOR.B$BUILD"
          DISPLAY_VER="Version $VERSION_NAME"
          
          # 5. Export to GITHUB_ENV for downstream steps
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "DISPLAY_VER=$DISPLAY_VER" >> $GITHUB_ENV
          
          # 6. Write values back to properties file
          echo "MAIN=$MAIN" > $PROPS_FILE
          echo "MINOR=$MINOR" >> $PROPS_FILE
          echo "BUILD=$BUILD" >> $PROPS_FILE
          
          # 7. Update version strings in project files
          # Using a broad regex to find "Version X.Y.BZ" or "vX.Y.BZ"
          SED_PATTERN="[0-9]\+\.[0-9]\+\.B[0-9]\+"
          
          sed -i "s/Version $SED_PATTERN/$DISPLAY_VER/g" setup.sh
          sed -i "s/Version $SED_PATTERN/$DISPLAY_VER/g" scripts/maxter_tui.sh
          sed -i "s/Version $SED_PATTERN/$DISPLAY_VER/g" README.md
          sed -i "s/Version $SED_PATTERN/$DISPLAY_VER/g" docs-src/src/App.jsx
          # Also handle the v-prefix cases if any remain
          sed -i "s/v$SED_PATTERN/$DISPLAY_VER/g" docs-src/src/App.jsx
          
          # Pass variable to other steps if needed via output
          echo "new_version=$DISPLAY_VER" >> $GITHUB_OUTPUT

      - name: Commit and Push Changes
        run: |
          # Configure identity as github-actions[bot]
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Only commit if files actually changed (idempotency)
          if ! git diff --exit-code; then
            git add .
            git commit -m "chore: bump version to ${{ env.DISPLAY_VER }}"
            git push
          else
            echo "No changes detected. Skipping commit."
          fi
